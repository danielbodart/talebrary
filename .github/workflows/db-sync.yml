name: Database Sync

on:
  # Quarterly: 8th of Jan/Apr/Jul/Oct (week after IFDB's typical ~1st publish)
  schedule:
    - cron: '0 2 8 1,4,7,10 *'
  # Manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: tools
          key: mise-tools-${{ hashFiles('mise.toml') }}

      - name: Setup tools
        run: . ./bootstrap.sh

      - name: Download and convert IFDB
        run: |
          ./db/run download
          ./db/run convert-ifdb

      - name: Sync into talebrary schema
        run: ./db/run sync

      - name: Upload to D1
        run: ./db/run upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit updated database
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add db/talebrary.sqlite
          git diff --staged --quiet || git commit -m "chore: sync IFDB quarterly data"
          git push
        continue-on-error: true
