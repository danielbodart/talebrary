compatibility_date = "2025-02-03"
compatibility_flags = ["nodejs_compat"]
name = "talebrary"
main = "src/cloudflare/app.ts"

# agt2agx.wasm (from @bodar/wasiglk) is imported server-side to convert classic
# multi-file AGT games into a single AGX. Workers require Wasm to be bundled as a
# pre-compiled module — it cannot be fetched/compiled at request time.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "db"
database_name = "talebrary"
database_id = "72a0543e-663c-4bf0-bc0e-c24bcd666888"
remote = true

[[r2_buckets]]
binding = 'r2'
bucket_name = 'talebrary'
preview_bucket_name = 'talebrary'
remote = true

# Build-time client assets (CSS/JS/HTML/images/wasm) are served by the Workers
# Static Assets layer and versioned atomically with each `wrangler deploy` —
# they no longer live in R2 (only runtime-written content/, cards/art/,
# workflow-images/ do). html_handling=none preserves current behaviour: bare
# /cards and /player stay 404 (no index.html rewriting). not_found_handling=none
# lets every non-asset path fall through to the Worker. run_worker_first lists
# the two template-processed HTML files (they carry <meta template=default> and
# must pass through templateHandler for the head/fonts/analytics-beacon wrapper).
[assets]
directory = "./www"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "none"
run_worker_first = [ "/cards/index.html", "/player/index.html" ]

[ai]
binding = "ai"

# Transcript analytics stream (Cloudflare Pipelines → R2 Data Catalog).
# stream = talebrary_transcripts (ID); pipeline talebrary_transcripts_pipe → transcripts_sink.
[[pipelines]]
binding = "TRANSCRIPTS"
stream = "60fed8fa599648229f789bc9f34320b2"

[[durable_objects.bindings]]
name = "IFARCHIVE_PROXY"
class_name = "IfArchiveProxy"

[[migrations]]
tag = "v1"
new_classes = ["IfArchiveProxy"]

[[workflows]]
name = "talebrary-cover-art"
binding = "COVER_ART_WORKFLOW"
class_name = "CoverArtWorkflow"

[[workflows]]
name = "talebrary-illustration"
binding = "ILLUSTRATION_WORKFLOW"
class_name = "IllustrationWorkflow"
