compatibility_date = "2025-02-03"
name = "talebrary"
main = "src/cloudflare/app.ts"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "db"
database_name = "talebrary"
database_id = "72a0543e-663c-4bf0-bc0e-c24bcd666888"

[[r2_buckets]]
binding = 'r2'
bucket_name = 'talebrary'
preview_bucket_name = 'talebrary'

[ai]
binding = "ai"

# CUT HERE
# Everything after this line will be removed when running wrangler dev as queues arn't supported yet
# And they don't ignore them either
[production]
[[queues.producers]]
queue = "events"
binding = "events"

[[queues.consumers]]
queue = "events"
max_batch_size = 50
max_batch_timeout = 1

