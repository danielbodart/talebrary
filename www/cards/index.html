<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <meta name="template" content="card"/>
</head>
<body>
<main class="story cards">
    <div class="window buffer">
        <template id="card">
            <div class="card">
                <img class="image" loading="lazy" alt="" aria-hidden="true"
                     src="/cards/art?prompt=">
                <div class="title">
                    <slot name="title">Need a title</slot>
                </div>
                <div class="description">
                    <slot name="description">Needs a description</slot>
                </div>
            </div>
        </template>
        <div class="card">
            <form class="input">
                <label>Title: <input type="text" id="title" name="title" required autofocus/></label>
                <label>Description: <input type="text" id="description" name="description" required/></label>
            </form>
            <script>
                document.querySelector('input[name=title]').addEventListener('keyup', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        document.querySelector('input[name=description]').focus({preventScroll: true});
                    }
                });
                document.querySelector('input[name=description]').addEventListener('keyup', (event) => {
                    // on enter focus description element
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        const form = document.querySelector('form.input');
                        const title = form.querySelector('input[name=title]').value;
                        const description = form.querySelector('input[name=description]').value;
                        const card = document.getElementById('card').content.cloneNode(true);
                        card.querySelector('.image').src += encodeURIComponent(JSON.stringify({title, description}));
                        card.querySelector('.title').textContent = title;
                        card.querySelector('.description').textContent = description;
                        document.querySelector('.results').appendChild(card);
                        form.reset();
                        document.querySelector('input[name=title]').focus({preventScroll: true});
                    }
                });
            </script>
        </div>
    </div>
</main>
<section class="results cards"></section>
</body>
</html>
