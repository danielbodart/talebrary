<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <meta name="template" content="default"/>
    <link rel="stylesheet" href="/cards/main.css">
</head>
<body>
<card-creator class="card active" tabindex="0">
    <template>
        <playing-card class="card" tabindex="0">
            <div class="delete"><img src="/icons/xmark-solid.svg" alt="Delete Card" title="Delete Card"></div>
            <img is="x-image" class="image" loading="lazy" alt="">
            <form class="form-image">
                <textarea name="description" required placeholder="Image description"></textarea>
                <label class="model">
                    <span>Model:</span>
                    <select name="model">
                        <option value="@cf/bytedance/stable-diffusion-xl-lightning" selected>stable-diffusion</option>
                        <option value="@cf/lykon/dreamshaper-8-lcm">dreamshaper</option>
                        <option value="@cf/black-forest-labs/flux-1-schnell">flux-1-schnell</option>
                    </select>
                </label>
                <div class="regenerate" tabindex="0">
                    <img src="/icons/rotate-right-solid.svg" alt="Regenerate image" title="Regenerate image">
                </div>
            </form>
            <h1 class="title" contenteditable data-placeholder="Title"></h1>
            <div class="rules" contenteditable data-placeholder="Rules"></div>
            <div class="quantity" contenteditable title="Quantity">1</div>
        </playing-card>
    </template>
    <p class="rules">Click me to create a new card</p>
    <div class="image" aria-hidden="true"></div>
    <p class="rules">Click a previous card to edit it</p>
</card-creator>
<script type="module" src="/cards/main.js"></script>
</body>
</html>
