<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <meta name="template" content="card"/>
    <link rel="stylesheet" href="/cards/main.css">
</head>
<body is="card-creator">
<main class="story cards">
    <div class="window buffer">
        <template id="card">
            <div class="card" data-quantity="1" data-uuid="">
                <img is="x-image" reloadable class="image" loading="lazy" alt="" aria-hidden="true"
                     src="/cards/art?">
                <div class="title"></div>
                <div class="rules"></div>
            </div>
        </template>
        <div class="card">
            <form class="input">
                <label for="title">Title:</label><input type="text" id="title" name="title" required autofocus/>
                <label for="description">Image of:</label><input type="text" id="description" name="description" required/>
                <label for="rules">Rules:</label><input type="text" id="rules" name="rules" required/>
                <label for="model">Model:</label>
                <select name="model" id="model">
                    <option value="@cf/bytedance/stable-diffusion-xl-lightning" selected>stable-diffusion-xl-lightning</option>
                    <option value="@cf/lykon/dreamshaper-8-lcm">dreamshaper-8-lcm</option>
                </select>
                <label for="quantity">Quantity: (printed)</label><input type="number" min="1" max="10" value="1" name="quantity" id="quantity"/>
                <button type="submit">Add</button>
            </form>
        </div>
    </div>
</main>
<section class="results cards"></section>
<script src="/cards/main.js"></script>
</body>
</html>
