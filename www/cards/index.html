<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <meta name="template" content="card"/>
    <link rel="stylesheet" href="/cards/main.css">
</head>
<body>
<main class="story cards">
    <div class="window buffer">
        <template id="card">
            <div class="card">
                <img is="x-image" class="image" loading="lazy" alt="" aria-hidden="true"
                     src="/cards/art?">
                <div class="title">
                    <slot name="title">Need a title</slot>
                </div>
                <div class="rules">
                    <slot name="rules">The rules</slot>
                </div>
            </div>
        </template>
        <div class="card">
            <form class="input">
                <label>Title: <input type="text" id="title" name="title" required autofocus/></label>
                <label>Image description: <input type="text" id="description" name="description" required/></label>
                <label>Rules: <input type="text" id="rules" name="rules" required/></label>
                <label>Model:
                    <select name="model">
                        <option value="@cf/bytedance/stable-diffusion-xl-lightning" selected>stable-diffusion-xl-lightning</option>
                        <option value="@cf/lykon/dreamshaper-8-lcm">dreamshaper-8-lcm</option>
                    </select>
                </label>
            </form>
            <script src="/cards/main.js"></script>
        </div>
    </div>
</main>
<section class="results cards"></section>
</body>
</html>
