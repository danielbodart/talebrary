<!DOCTYPE html>
<html lang="en">
<head>
    <title>Content</title>
    <meta name="template" content="default"/>
    <link rel="stylesheet" href="/new-client/main.css">
</head>
<body>
<interactive-fiction src="story" type="zcode">
    <template>
        <grid-window id="grid-">
            <grid-line id="grid-line-{id}"></grid-line>
        </grid-window>
        <buffer-window id="window-{id}">
            <buffer-section></buffer-section>
            <buffer-section class="scene">
                <img is="x-image" reloadable class="image" loading="lazy" alt="" aria-hidden="true"
                     src="art?prompt={prompt}&model={model}"/>
                <h1 class="title {style}">{text}</h1>
                <p class="content {style}">{text}</p>
                <p class="content">
                    <span class="text {style}">{text}</span>
                </p>
                <input-suggestions reloadable src="suggestions?prompt={prompt}">
                    <x-instruction>{text}</x-instruction>
                </input-suggestions>
            </buffer-section>
            <user-input>
                <form>
                    <input type="text" maxlength="{length}" value="{initial}" placeholder="{placeholder}"
                           list="input-history" data-gen={gen} data-id={id} data-type={type}/>
                    <datalist id="input-history">
                        <option value={item}></option>
                    </datalist>
                </form>
            </user-input>
        </buffer-window>
    </template>
    <buffer-window>
        <buffer-section>
            <img class="image"
                 src="/content/fft6pu91j85y4acv/art?prompt=%7B%22story%22%3A%7B%22title%22%3A%22Adventure%22%2C%22description%22%3A%22%22%7D%2C%22scene%22%3A%7B%22title%22%3A%22At%20End%20Of%20Road%22%2C%22description%22%3A%22You%20are%20standing%20at%20the%20end%20of%20a%20road%20before%20a%20small%20brick%20building.%20Around%20you%20is%20a%20forest.%20A%20small%20stream%20flows%20out%20of%20the%20building%20and%20down%20a%20gully.%22%7D%7D&model=llama%2Bstable-diffusion"
                 loading="lazy">
            <h1 class="title">Adventure</h1>
            <div class="author">William Crowther and Donald Woods</div>
        </buffer-section>
    </buffer-window>
</interactive-fiction>
<script type="module" src="/new-client/main.js"></script>
</body>
</html>
